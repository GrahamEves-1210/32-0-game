<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#cfe0f5" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0d1f4e" />
    <title>32-0 Game — College Basketball Draft</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <svg style="display:none">
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise"/>
        <feComponentTransfer>
          <feFuncR type="linear" slope="2" intercept="-0.5"/>
          <feFuncG type="linear" slope="2" intercept="-0.5"/>
          <feFuncB type="linear" slope="2" intercept="-0.5"/>
        </feComponentTransfer>
      </filter>
    </svg>
    <div id="grain-overlay" style="
      position:fixed;inset:0;z-index:9999;pointer-events:none;
      width:100%;height:100%;
      background:white;
      filter:url(#grain-filter);
      opacity:0.09;
    "></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
